<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Game Remote Control</title>
    <style>
        body {
            font-family: monospace;
            background: #0f172a;
            color: #94a3b8;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #22d3ee;
            font-size: 1.5rem;
        }
        .section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
        }
        button:hover {
            background: #2563eb;
        }
        button.danger {
            background: #dc2626;
        }
        button.danger:hover {
            background: #b91c1c;
        }
        button.success {
            background: #10b981;
        }
        button.success:hover {
            background: #059669;
        }
        .label {
            color: #cbd5e1;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        .status {
            background: #0f172a;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            color: #22d3ee;
        }
    </style>
</head>
<body>
    <h1>🕹️ War Game Remote Control</h1>
    <p style="color: #64748b; font-size: 12px;">Control the simulation remotely via localStorage commands</p>

    <div class="section">
        <span class="label">Simulation Controls</span>
        <button onclick="sendCommand('start')">▶ Start Simulation</button>
        <button onclick="sendCommand('pause')">⏸ Pause Simulation</button>
        <button class="danger" onclick="sendCommand('reset')">🔄 Reset All</button>
    </div>

    <div class="section">
        <span class="label">Trigger Use Cases</span>
        <button onclick="sendCommand('trigger:1')">📦 Use Case #1: Supply Chain</button>
        <button onclick="sendCommand('trigger:2')">⚖️ Use Case #2: Compliance</button>
        <button onclick="sendCommand('trigger:3')">🔧 Use Case #3: Infrastructure</button>
    </div>

    <div class="section">
        <span class="label">Action Buttons</span>
        <button class="success" onclick="sendCommand('cicd')">🚀 Start CI/CD Pipeline</button>
        <button class="success" onclick="sendCommand('remediation')">🔍 Check Lightwell</button>
        <button class="success" onclick="sendCommand('ansible')">🤖 Ansible Patch</button>
    </div>

    <div class="section">
        <span class="label">Display Controls</span>
        <button onclick="sendCommand('comparison')">📊 Toggle Comparison Mode</button>
    </div>

    <div class="section">
        <span class="label">Quick Scenarios</span>
        <button onclick="runScenario1()">⚡ Quick Demo: Use Case #1</button>
        <button onclick="runScenario3()">⚡ Quick Demo: Use Case #3</button>
    </div>

    <div class="status" id="status">Ready. Commands will be sent to the main War Game window.</div>

    <script>
        function sendCommand(cmd) {
            localStorage.setItem('war-game-command', cmd);
            updateStatus(`Sent command: ${cmd}`);
        }

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
            setTimeout(() => {
                document.getElementById('status').innerText = 'Ready. Commands will be sent to the main War Game window.';
            }, 2000);
        }

        // Quick scenario: Full Use Case #1 flow
        function runScenario1() {
            sendCommand('start');
            setTimeout(() => sendCommand('trigger:1'), 1000);
            setTimeout(() => sendCommand('cicd'), 9000);
            updateStatus('Running Use Case #1 full demo...');
        }

        // Quick scenario: Full Use Case #3 flow
        function runScenario3() {
            sendCommand('start');
            setTimeout(() => sendCommand('trigger:3'), 1000);
            setTimeout(() => sendCommand('ansible'), 13000);
            updateStatus('Running Use Case #3 full demo...');
        }
    </script>
</body>
</html>
